<!DOCTYPE html>
<html>

<head>

    <title>Position Example</title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="h-[200vh]">

    <div class="sticky top-0 bg-blue-500 text-white p-5">
        Sticky Navbar
    </div>

    <div class="relative w-96 h-96 bg-gray-300 m-10">

        <div 
        class="absolute bottom-5 right-5 bg-red-500 text-white p-5"
        >
            Absolute Box
        </div>

    </div>

    <div class="fixed bottom-5 right-5 bg-black text-white p-5 rounded-full">
        Fixed Button
    </div>

</body>

</html>
