<!DOCTYPE html>
<html>

<head>
    <title>Day 02 HTML Basics</title>
</head>

<body>

    <h1>HTML Basics</h1>

    <p>This is a paragraph tag.</p>

    <h2>Anchor Tag</h2>

    <a href="https://google.com" target="_blank">
        Open Google
    </a>

    <h2>Ordered List</h2>

    <ol>
        <li>Apple</li>
        <li>Mango</li>
        <li>Orange</li>
    </ol>

    <h2>Unordered List</h2>

    <ul>
        <li>Car</li>
        <li>Bike</li>
        <li>Bus</li>
    </ul>

    <h2>Local Image</h2>

    <img src="images/photo.jpg" width="200" alt="Local Image">

    <h2>CDN Image</h2>

    <img 
    src="https://images.unsplash.com/photo-1506744038136-46273834b3fb"
    width="300"
    alt="CDN Image"
    >

    <h2>Audio</h2>

    <audio controls>
        <source src="audio/song.mp3">
    </audio>

    <h2>Video</h2>

    <video width="300" controls>
        <source src="video/sample.mp4">
    </video>

</body>

</html>
