<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Responsive Navbar</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

  <!-- Container -->
   
  <div class="xl:container mx-auto mt-5">

    <!-- Navbar -->
    <div class="w-[95%] mx-auto">

      <div class="grid grid-cols-1 md:grid-cols-2">

        <!-- Left Section -->
        <div class="bg-gray-300 py-3 px-3 flex items-center justify-between">

          <!-- Logo -->
          <h1 class="text-lg font-medium">
            Logo
          </h1>

          <!-- Icons -->
          <div>

            <!-- Menu Icon -->
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="cursor-pointer md:hidden"
              id="menu_open"
            >
              <path d="M4 12h16" />
              <path d="M4 18h16" />
              <path d="M4 6h16" />
            </svg>

            <!-- Cross Icon -->
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="cursor-pointer hidden md:hidden"
              id="cross"
            >
              <path d="M18 6 6 18" />
              <path d="m6 6 12 12" />
            </svg>

          </div>
        </div>

        <!-- Navigation List -->
        <div class="hidden md:block" id="nav_list">

          <ul
            class="flex flex-col items-center md:flex-row md:justify-end gap-5 bg-green-300 py-3 px-5"
          >
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
          </ul>

        </div>

      </div>

    </div>

  </div>

  <script>

    // Elements
    var menu_open = document.getElementById("menu_open");
    var cross = document.getElementById("cross");
    var nav_list = document.getElementById("nav_list");

    // Open Menu
    menu_open.addEventListener("click", () => {

      cross.classList.remove("hidden");
      menu_open.classList.add("hidden");

      nav_list.classList.remove("hidden");
      nav_list.classList.add("block");

    });

    // Close Menu
    cross.addEventListener("click", () => {

      cross.classList.add("hidden");
      menu_open.classList.remove("hidden");

      nav_list.classList.add("hidden");
      nav_list.classList.remove("block");

    });

  </script>

</body>
</html>
