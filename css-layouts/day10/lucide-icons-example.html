<!DOCTYPE html>
<html>

<head>

    <title>Lucide Icons Example</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://unpkg.com/lucide@latest"></script>

</head>

<body class="h-screen flex justify-center items-center bg-gray-100">

    <div class="flex gap-10">

        <i 
        data-lucide="home"
        class="text-blue-500 w-12 h-12"
        >
        </i>

        <i 
        data-lucide="heart"
        class="text-red-500 w-12 h-12"
        >
        </i>

        <i 
        data-lucide="search"
        class="text-green-500 w-12 h-12"
        >
        </i>

    </div>

    <script>
        lucide.createIcons();
    </script>

</body>

</html>
