<!DOCTYPE html>
<html>

<head>

    <title>Tailwind Grid Example</title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

    <div class="container mx-auto px-5 py-10">

        <h1 class="text-4xl font-bold text-center mb-10">
            Grid Layout
        </h1>

        <div 
        class="grid grid-cols-12 gap-5"
        >

            <div 
            class="col-span-12 md:col-span-6 lg:col-span-4 bg-red-500 text-white p-10 rounded-xl"
            >
                Card 1
            </div>

            <div 
            class="col-span-12 md:col-span-6 lg:col-span-4 bg-blue-500 text-white p-10 rounded-xl"
            >
                Card 2
            </div>

            <div 
            class="col-span-12 md:col-span-12 lg:col-span-4 bg-green-500 text-white p-10 rounded-xl"
            >
                Card 3
            </div>

        </div>

    </div>

</body>

</html>
